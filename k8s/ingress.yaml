apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: audio-analysis
  namespace: ai-music-xray
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: analysis.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: audio-analysis
                port:
                  number: 80

