apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-analysis
  namespace: ai-music-xray
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audio-analysis
  template:
    metadata:
      labels:
        app: audio-analysis
    spec:
      containers:
        - name: audio-analysis
          image: ghcr.io/your-org/ai-music-xray-audio-analysis:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: audio-analysis-config
            - secretRef:
                name: audio-analysis-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

